        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Poppins:wght@300;400;600;700&family=Montserrat:wght@400;600;700&family=Source+Sans+3:wght@300;400&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        .btn-pc-primary {
          font-family: 'Poppins', sans-serif;
          display: inline-block;
          background-color: rgba(72,0,163,1);
          color: #fff;
          padding: 14px 36px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          border: none;
          cursor: pointer;
          font-size: 13px;
          font-weight: 600;
          border-radius: 10px;
          transition: all 0.3s ease;
        }
        .btn-pc-primary:hover {
          background-color: rgba(90,10,200,1);
          transform: translateY(-2px);
          box-shadow: 0 10px 36px rgba(72,0,163,0.45);
        }
        .btn-pc-teal {
          font-family: 'Poppins', sans-serif;
          display: inline-block;
          background-color: rgba(2,146,183,1);
          color: #fff;
          padding: 14px 36px;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          border: none;
          cursor: pointer;
          font-size: 13px;
          font-weight: 600;
          border-radius: 10px;
          transition: all 0.3s ease;
        }
        .btn-pc-teal:hover {
          background-color: rgba(2,120,155,1);
          transform: translateY(-2px);
          box-shadow: 0 10px 36px rgba(2,146,183,0.45);
        }
        .btn-pc-outline {
          font-family: 'Poppins', sans-serif;
          background: transparent;
          color: #fff;
          padding: 10px 22px;
          letter-spacing: 0.16em;
          text-transform: uppercase;
          border: 1px solid rgba(255,255,255,0.4);
          cursor: pointer;
          font-size: 10px;
          font-weight: 400;
          border-radius: 40px;
          transition: all 0.3s ease;
          background-color: rgba(26,26,26,0.71);
        }
        .btn-pc-outline:hover { border-color: rgba(2,146,183,1); color: rgba(2,146,183,1); }

        .img-zoom { overflow: hidden; }
        .img-zoom img, .img-zoom div { transition: transform 0.6s ease; }
        .img-zoom:hover img, .img-zoom:hover div { transform: scale(1.04); }
        .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.1); }
        .day-row { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: default; }
        .day-row:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(72,0,163,0.12); z-index: 2; position: relative; }

        /* Line accent \u{2014} exact from ShowIt CSS: teal rgba(0,160,163) */
        .pc-line-teal {
          display: block; height: 8px; border: none;
          background-color: rgba(0,160,163,1); width: 200px; margin: 0 0 20px 0;
        }
        .pc-line-purple {
          display: block; height: 8px; border: none;
          background-color: rgba(72,0,163,1); width: 200px; margin: 0 0 20px 0;
        }

        /* Footer nav links */
        .footer-link { color: rgba(255,255,255,1); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.8; transition: color 0.2s; }
        .footer-link:hover { color: rgba(192,255,0,1); }
        .footer-link-lime { color: rgba(187,251,9,1); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.8; }

        @media (max-width: 768px) {
          .two-col { grid-template-columns: 1fr !important; gap: 40px !important; }
          .three-col { grid-template-columns: 1fr 1fr !important; }
          .hero-title { font-size: clamp(3.5rem,16vw,6rem) !important; }
          .hide-mobile { display: none !important; }
          .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
          .price-grid { grid-template-columns: 1fr !important; }
        }
